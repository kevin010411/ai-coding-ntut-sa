# Authority Registry for ezddd-java Pattern Files
#
# Purpose: Define the single source of truth for each topic and track
# which consumer files must stay in sync.
#
# When a type-specific pattern file (authority) is updated, all consumer
# files listed here must be checked and updated accordingly.
#
# Verification:
#   Execute consistency-checklist.yaml XR-02 for authority/consumer integrity check

meta:
  version: "3.6"
  principle: "Single Source of Authority — 每個概念只在一處完整定義，其他地方標記引用"
  last_audit: "2026-02-09"
  enforcement:
    hook: "check-authority-consumers.py v2.0 (PostToolUse, bidirectional)"
    script: "check-pattern-consistency.sh v3.2 (6 phases)"
    blocking_severity: ["critical"]
    warn_severity: ["high", "must"]
  maintenance_rules:
    - "修改任何 pattern/rule 前，先查 AUTHORITY-REGISTRY.yaml 找到 authority"
    - "只修改 authority 檔案，然後更新所有 consumers"
    - "新增概念時，先在 registry 註冊 topic，再寫入 authority"
    - "templates 修改後，必須執行 consistency-checklist.yaml XR-07 驗證對齊"
  # consumer_type classification: files matching these patterns are "rule" type.
  # Rule consumers describe rules in prose/YAML — they are NOT expected to contain
  # canonical code patterns or to be free of anti-pattern text references.
  # All other consumers default to "reference" type (must contain canonical patterns).
  rule_consumers:
    - "code-reviewer/checklist.md"
    - "code-reviewer/must-fail-conditions.md"
    - "rules/critical-rules.md"
    - "gate25/deterministic-review-rules.yaml"
    - "uc-executor/uc-workflow.md"

topics:

  # ──────────────────────────────────────────────────────────────
  # Group: usecase
  # ──────────────────────────────────────────────────────────────

  command_input_type:
    description: "Command UseCase Input must be class with create() factory, not record"
    authority: "patterns/usecase/command.md"
    authority_line_hint: 172
    canonical_pattern: "class.*Input implements Input"
    anti_pattern: "record.*Input.*implements Input"
    severity: critical
    group: usecase
    dedup_strategy: marker
    consumers:
      - file: "rules/usecase-patterns.md"
        section: "Input Must Be Class"
      - file: "rules/framework-api.md"
        section: "Command UseCase Interface"
      - file: "patterns/testing/usecase-test.md"
        section: "GENERATION TEMPLATES"
      - file: "code-reviewer/checklist.md"
        section: "UseCase Input Checklist"
      - file: "framework/ezapp-api.md"
        section: "4. Use Case 實作"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 22

  test_input_construction:
    description: "Test code must use Input.create() + field assignment, not positional constructor"
    authority: "patterns/usecase/command.md"
    authority_line_hint: 177
    canonical_pattern: '\.create\(\)'
    anti_pattern: 'new\s+\w+UseCase\.\w*Input\('
    severity: critical
    group: usecase
    dedup_strategy: marker
    consumers:
      - file: "patterns/testing/usecase-test.md"
        section: "EXAMPLE OUTPUT"
      - file: "code-reviewer/checklist.md"
        section: "Test Input Construction"
    template_consumers:
      - file: "templates/test-case-full.md"
        section: "Input.create() usage in test examples"

  cqrs_output_wildcard:
    description: "UseCase interface must use CqrsOutput<?> with wildcard, not raw CqrsOutput"
    authority: "patterns/usecase/command.md"
    authority_line_hint: 569
    canonical_pattern: "CqrsOutput<\\?>"
    anti_pattern: "Command<.*,\\s*CqrsOutput>"
    severity: critical
    group: usecase
    dedup_strategy: marker
    consumers:
      - file: "rules/usecase-patterns.md"
        section: "UseCase Interface"
      - file: "rules/framework-api.md"
        section: "Command UseCase Interface"
      - file: "code-reviewer/checklist.md"
        section: "UseCase Output Checklist"
      - file: "framework/ezapp-api.md"
        section: "4. Use Case 實作"

  usecaseconfig_no_profile:
    description: "UseCaseConfig must NOT have @Profile annotation — active in all profiles"
    authority: "patterns/infrastructure/config.md"
    authority_line_hint: 169
    canonical_pattern: '@Configuration\npublic class.*UseCaseConfig'
    anti_pattern: '@Profile.*\npublic class.*UseCaseConfig'
    severity: critical
    group: usecase
    dedup_strategy: marker
    consumers:
      - file: "rules/framework-api.md"
        section: "Spring Service Registration"
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Template 3"

  # ──────────────────────────────────────────────────────────────
  # Group: domain
  # ──────────────────────────────────────────────────────────────

  domain_event_mapper_key:
    description: "Domain Event mapper() must use MAPPING_TYPE_PREFIX constant, not SCREAMING_SNAKE_CASE"
    authority: "patterns/domain/domain-event.md"
    authority_line_hint: 327
    canonical_pattern: "MAPPING_TYPE_PREFIX"
    anti_pattern: 'mapper\.put\("[A-Z_]+",\s'
    severity: critical
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "rules/domain-patterns.md"
        section: "Domain Events"
      - file: "code-reviewer/checklist.md"
        section: "Domain Event Checklist"
      - file: "examples/PlanEvents.java"
        section: "mapper()"

  mapping_type_prefix_position:
    description: "MAPPING_TYPE_PREFIX constant placed after source() default method"
    authority: "patterns/domain/domain-event.md"
    authority_line_hint: 648
    canonical_pattern: "source.*MAPPING_TYPE_PREFIX"
    anti_pattern: "MAPPING_TYPE_PREFIX.*source"
    severity: must
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "rules/domain-patterns.md"
        section: "Domain Events"
      - file: "examples/PlanEvents.java"
        section: "interface body"

  aggregate_isDeleted_no_declare:
    description: "Aggregate subclass MUST NOT declare isDeleted/version fields (field shadowing)"
    authority: "patterns/domain/aggregate.md"
    authority_line_hint: 213
    canonical_pattern: "EsAggregateRoot.*provides.*isDeleted"
    anti_pattern: "private.*boolean.*isDeleted"
    severity: critical
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "rules/domain-patterns.md"
        section: "Common Mistakes"
      - file: "rules/critical-rules.md"
        section: "FORBIDDEN Rule 21"

  dateprovider_not_instant:
    description: "Always use DateProvider.now() instead of Instant.now() for event timestamps"
    authority: "rules/common-rules.md"
    authority_line_hint: 23
    canonical_pattern: "DateProvider\\.now\\(\\)"
    anti_pattern: "Instant\\.now\\(\\)"
    severity: critical
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "patterns/domain/aggregate.md"
        section: "Rule 3"
      - file: "patterns/domain/domain-event.md"
        section: "Rule 10"
      - file: "patterns/infrastructure/mapper.md"
        section: "EXAMPLE OUTPUT"
      - file: "rules/critical-rules.md"
        section: "Rule 4"
      - file: "framework/ezapp-api.md"
        section: "1. Aggregate Root 實作 and 1. DateProvider"
    template_consumers:
      - file: "templates/reactor-full.md"
        section: "Use DateProvider.now() for timestamps"
      - file: "examples/Plan.java"
        section: "DateProvider.now() in apply() calls"

  value_object_record_pattern:
    description: "Value Object must be record type implementing ValueObject with compact constructor + Objects.requireNonNull()"
    authority: "patterns/domain/value-object.md"
    authority_line_hint: 54
    canonical_pattern: "record.*implements ValueObject"
    anti_pattern: "class.*implements ValueObject"
    severity: critical
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "rules/domain-patterns.md"
        section: "Value Objects"
      - file: "code-reviewer/checklist.md"
        section: "Value Object Checklist"
      - file: "framework/ezapp-api.md"
        section: "2. Value Object 實作"

  # ──────────────────────────────────────────────────────────────
  # Group: infrastructure
  # ──────────────────────────────────────────────────────────────

  inmemory_ormdb_map_constructor:
    description: "InMemoryOrmDb MUST use Map-arg constructor, not no-arg constructor"
    authority: "patterns/infrastructure/config.md"
    authority_line_hint: 196
    canonical_pattern: 'new InMemoryOrmDb<>\(\w+DataStore\)'
    anti_pattern: 'new InMemoryOrmDb<>\(\)'
    severity: critical
    group: infrastructure
    dedup_strategy: marker
    consumers:
      - file: "rules/framework-api.md"
        section: "InMemoryMessageProducer API"
      - file: "framework/ezapp-api.md"
        section: "5. Repository 配置 > InMemory"
      - file: "templates/local-utils.md"
        section: "InMemoryRepositoryConfig"
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Template 1"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 6

  repository_bean_naming:
    description: "InMemory and Outbox repository configs MUST use the same bean name (e.g. productRepository)"
    authority: "patterns/infrastructure/config.md"
    authority_line_hint: 82
    canonical_pattern: '@Bean\("[a-z]+Repository"\)'
    anti_pattern: '@Bean\("(inMemory|outbox)[A-Z]'
    severity: critical
    group: infrastructure
    dedup_strategy: marker
    consumers:
      - file: "rules/usecase-patterns.md"
        section: "Repository Config"
      - file: "framework/ezapp-api.md"
        section: "5. Repository 配置 > InMemory and Outbox"
      - file: "templates/local-utils.md"
        section: "InMemoryRepositoryConfig bean names"
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Template 1 and Template 2"

  ormclient_extends_springjpaclient:
    description: "OrmClient must extend SpringJpaClient only — no CrudRepository or JpaRepository"
    authority: "patterns/infrastructure/config.md"
    authority_line_hint: 144
    canonical_pattern: "extends SpringJpaClient"
    anti_pattern: "extends CrudRepository|extends JpaRepository"
    severity: critical
    group: infrastructure
    dedup_strategy: marker
    consumers:
      - file: "rules/framework-api.md"
        section: "OrmClient / SpringJpaClient API"
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Template 4"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 17

  set_version_before_clear:
    description: "In toDomain(), setVersion() must come before clearDomainEvents()"
    authority: "patterns/infrastructure/mapper.md"
    authority_line_hint: 174
    canonical_pattern: "setVersion.*clearDomainEvents"
    anti_pattern: "clearDomainEvents.*setVersion"
    severity: critical
    group: infrastructure
    dedup_strategy: marker
    consumers:
      - file: "rules/critical-rules.md"
        section: "Rule 24"
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Generation Checklist"

  outbox_mapper_two_params:
    description: "OutboxMapper has exactly 2 type params: OutboxMapper<Aggregate, Data>"
    authority: "patterns/infrastructure/mapper.md"
    authority_line_hint: 50
    canonical_pattern: 'OutboxMapper<\w+,\s*\w+Data>'
    anti_pattern: 'OutboxMapper<\w+,\s*\w+Data,\s*\w+>'
    severity: critical
    group: infrastructure
    dedup_strategy: marker
    template_consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Generation Checklist"

  # ──────────────────────────────────────────────────────────────
  # Group: testing
  # ──────────────────────────────────────────────────────────────

  dirtiescontext_after_each:
    description: "@DirtiesContext(classMode = AFTER_EACH_TEST_METHOD) required on all tests extending BaseUseCaseTest"
    authority: "rules/testing-patterns.md"
    authority_line_hint: 5
    canonical_pattern: "AFTER_EACH_TEST_METHOD"
    anti_pattern: '@SpringBootTest\n(?!.*@DirtiesContext).*extends BaseUseCaseTest'
    severity: critical
    group: testing
    dedup_strategy: marker
    consumers:
      - file: "rules/framework-api.md"
        section: "ezSpec BDD Testing"
      - file: "init-project/templates.md"
        section: "BaseUseCaseTest @DirtiesContext annotation"
      - file: "patterns/testing/repository-test.md"
        section: "Test Structure and Key Rules > 2. Test Isolation"
    template_consumers:
      - file: "templates/base-test-classes.md"
        section: "BaseUseCaseTest"
      - file: "templates/reactor-full.md"
        section: "@DirtiesContext in Reactor test example"
      - file: "examples/dual-profile-test-infrastructure.md"
        section: "Concrete test @DirtiesContext declarations"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 1

  setup_event_capture_manual:
    description: "Subclasses of BaseUseCaseTest MUST manually call setUpEventCapture() in @BeforeEach"
    authority: "rules/testing-patterns.md"
    authority_line_hint: 54
    canonical_pattern: "setUpEventCapture\\(\\)"
    anti_pattern: '@BeforeEach(?!.*setUpEventCapture)'
    severity: critical
    group: testing
    dedup_strategy: marker
    consumers:
      - file: "init-project/templates.md"
        section: "BaseUseCaseTest setUpEventCapture lifecycle"
    template_consumers:
      - file: "templates/base-test-classes.md"
        section: "Concrete Test Class Example"
      - file: "templates/test-case-full.md"
        section: "setUpEventCapture() in @BeforeEach"

  # ──────────────────────────────────────────────────────────────
  # Group: workflow (Task execution and infrastructure rules)
  # ──────────────────────────────────────────────────────────────

  task_results_update:
    description: "Task 執行完畢後必須更新 JSON 的 status 和 results 欄位"
    authority: "rules/common-rules.md"
    authority_line_hint: null
    canonical_pattern: '"status":\\s*"done"'
    anti_pattern: '"status":\\s*"todo".*results.*\\[\\]'
    severity: must
    group: workflow
    dedup_strategy: marker
    consumers: []

  outbox_testsuite_ddl_auto:
    description: "OutboxTestSuite 的 ddl-auto 必須保持 update，禁止改為 create-drop"
    authority: "rules/testing-patterns.md"
    authority_line_hint: null
    canonical_pattern: 'ddl-auto.*update'
    anti_pattern: 'ddl-auto.*(create-drop|create|none|validate)'
    severity: critical
    group: workflow
    dedup_strategy: marker
    consumers:
      - file: "templates/test-suites.md"
        section: "OutboxTestSuite"

  connectionframe_directory:
    description: "Use Case runbook 執行時必須建立 connectionframe 目錄（VolatileRelayConfig + CatchupRelayConfig）"
    authority: "patterns/infrastructure/config.md"
    authority_line_hint: null
    canonical_pattern: "connectionframe/"
    anti_pattern: "RelayConfig.*UseCaseConfig|VolatileRelay.*InMemory.*Config"
    severity: must
    group: workflow
    dedup_strategy: marker
    consumers:
      - file: "templates/aggregate-config-template.md"
        section: "Connection Frame configs"
      - file: "init-project/workflow.md"
        section: "Step 3: Shared Infrastructure"

  aggregate_semantics_check:
    description: "Aggregate 產生時必須讀取 aggregate.yaml 的 semantics 欄位並套用語意標籤"
    authority: "rules/domain-patterns.md"
    authority_line_hint: null
    canonical_pattern: "semantics:"
    anti_pattern: null
    severity: must
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "patterns/domain/aggregate.md"
        section: "Semantics Vocabulary"

  postcondition_event_verification:
    description: "Domain Event postcondition helper 必須驗證所有核心業務欄位"
    authority: "patterns/domain/aggregate.md"
    authority_line_hint: null
    canonical_pattern: "_\\w+EventGenerated"
    anti_pattern: "EventGenerated.*getId\\(\\).*// only checks ID"
    severity: must
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "code-reviewer/checklist.md"
        section: "Aggregate Root Checklist > Postcondition Check"
      - file: "rules/critical-rules.md"
        section: "ALWAYS REQUIRED #20"
      - file: "gate25/deterministic-review-rules.yaml"
        section: "REQ-POSTCONDITION-EVENT"

  # ──────────────────────────────────────────────────────────────
  # Group: forbidden (CRITICAL compilation/runtime errors)
  # Added: 2026-02-04 Phase 2
  # ──────────────────────────────────────────────────────────────

  service_no_component_annotation:
    description: "Service classes MUST NOT use @Component/@Service — use @Bean in Config class"
    authority: "rules/common-rules.md"
    authority_line_hint: 7
    canonical_pattern: '@Bean\n.*new \w+Service\('
    anti_pattern: '@(Component|Service)\npublic class \w+Service'
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "rules/usecase-patterns.md"
        section: "Service Registration"
      - file: "patterns/infrastructure/config.md"
        section: "UseCaseConfig bean registration"
      - file: "code-reviewer/checklist.md"
        section: "UseCase Checklist"
      - file: "code-reviewer/must-fail-conditions.md"
        section: "@Component/@Service on Service"
      - file: "patterns/usecase/reactor.md"
        section: "Rule 7: No @Service or @Component"
      - file: "framework/ezapp-api.md"
        section: "6. Reactor 實作"
      - file: "code-reviewer/workflow.md"
        section: "Issue categorization example"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 10

  no_active_profiles_annotation:
    description: "Test classes MUST NOT use @ActiveProfiles — let environment variables or TestSuite control profile"
    authority: "rules/common-rules.md"
    authority_line_hint: 10
    canonical_pattern: "SPRING_PROFILES_ACTIVE"
    anti_pattern: "@ActiveProfiles"
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "rules/testing-patterns.md"
        section: "Error Pattern #2"
      - file: "code-reviewer/checklist.md"
        section: "Test Checklist"
      - file: "code-reviewer/must-fail-conditions.md"
        section: "@ActiveProfiles usage"
      - file: "patterns/testing/controller-test.md"
        section: "Rule 2: No @ActiveProfiles Annotation"
      - file: "patterns/testing/repository-test.md"
        section: "Key Rules > 1. Profile Management"
    template_consumers:
      - file: "templates/base-test-classes.md"
        section: "ProfileSetter inner class"
      - file: "templates/test-suites.md"
        section: "Profile static block"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 2

  jakarta_not_javax:
    description: "MUST use jakarta.persistence, NEVER javax.persistence (Spring Boot 3+)"
    authority: "rules/common-rules.md"
    authority_line_hint: 9
    canonical_pattern: "jakarta\\.persistence"
    anti_pattern: "javax\\.persistence"
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "patterns/infrastructure/persistent-object.md"
        section: "JPA annotations"
      - file: "patterns/infrastructure/outbox.md"
        section: "JPA entity annotations"
      - file: "framework/ezapp-api.md"
        section: "⚠️ 重要提醒"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 16

  domain_event_static_mapper:
    description: "Events sealed interface MUST have static mapper() method for ADR-047 auto-registration"
    authority: "patterns/domain/domain-event.md"
    authority_line_hint: 371
    canonical_pattern: "static DomainEventTypeMapper mapper\\(\\)"
    anti_pattern: "class.*TypeMapper|TypeMapper.*inner class"
    severity: critical
    group: domain
    dedup_strategy: marker
    consumers:
      - file: "rules/domain-patterns.md"
        section: "Domain Events mapper()"
      - file: "code-reviewer/checklist.md"
        section: "Domain Event Checklist"
      - file: "code-reviewer/must-fail-conditions.md"
        section: "Missing mapper() method"
    template_consumers:
      - file: "examples/PlanEvents.java"
        section: "static mapper() method"
      - file: "templates/reactor-full.md"
        section: "Auto-Registration pattern (ADR-047)"
      - file: "init-project/templates.md"
        section: "DomainEventMapperConfig auto-scan"

  composite_mapper_no_putall:
    description: "DomainEventTypeMapper.putAll() does NOT exist — use getMap().forEach(compositeMapper::put)"
    authority: "rules/framework-api.md"
    authority_line_hint: 332
    canonical_pattern: "getMap\\(\\)\\.forEach"
    anti_pattern: "compositeMapper\\.putAll\\("
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "init-project/templates.md"
        section: "DomainEventMapperConfig merge pattern"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 12

  cqrs_output_api_correct:
    description: "CqrsOutput has no isSucceeded(), succeed(msg,id), setDto() — use fluent chain API"
    authority: "rules/framework-api.md"
    authority_line_hint: 56
    canonical_pattern: "CqrsOutput\\.create\\(\\).*\\.setId\\(.*\\.succeed\\(\\)"
    anti_pattern: "isSucceeded\\(\\)|succeed\\(\"|\\.setDto\\("
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "patterns/usecase/query.md"
        section: "CqrsOutput API usage"
      - file: "framework/ezapp-api.md"
        section: "4. Use Case 實作"
    jit_consumers:
      - file: "rules/critical-rules.md"
        rule_number: 27

  relay_import_path:
    description: "Relay classes are in tw.teddysoft.ezddd.data, NOT tw.teddysoft.ezddd.message.relay"
    authority: "rules/framework-api.md"
    authority_line_hint: 197
    canonical_pattern: "tw\\.teddysoft\\.ezddd\\.data\\.Ezes"
    anti_pattern: "tw\\.teddysoft\\.ezddd\\.message\\.relay"
    severity: critical
    group: forbidden
    dedup_strategy: marker
    consumers:
      - file: "rules/testing-patterns.md"
        section: "EzesVolatileRelay usage"
      - file: "patterns/infrastructure/outbox.md"
        section: "Relay configuration"
      - file: "framework/class-index.md"
        section: "Relay class entries"
      - file: "framework/ezapp-api.md"
        section: "5. PostgreSQL/Outbox Support and 2. InMemory Repository"
    template_consumers:
      - file: "examples/dual-profile-test-infrastructure.md"
        section: "VolatileRelay/CatchUpRelay config"
      - file: "templates/base-test-classes.md"
        section: "Relay lifecycle management"
      - file: "init-project/templates.md"
        section: "Connection Frame config imports"

  # ──────────────────────────────────────────────────────────────
  # Group: testing-traps (HIGH — test failures)
  # Added: 2026-02-04 Phase 3
  # ──────────────────────────────────────────────────────────────

  ezes_volatile_relay_singleton_trap:
    description: "EzesVolatileRelay is stateful Runnable — shutdownNow() makes it unreusable, requires @DirtiesContext"
    authority: "rules/testing-patterns.md"
    authority_line_hint: 5
    canonical_pattern: "@DirtiesContext.*AFTER_EACH_TEST_METHOD"
    anti_pattern: "executorService\\.shutdownNow\\(\\).*reuse"
    severity: high
    group: testing-traps
    dedup_strategy: marker
    consumers:
      - file: "templates/base-test-classes.md"
        section: "@see EZES-VOLATILE-RELAY-SINGLETON-TRAP.md"
      - file: "init-project/templates.md"
        section: "BaseUseCaseTest relay lifecycle warning"
      - file: "patterns/testing/repository-test.md"
        section: "Key Rules > 2. Test Isolation"

  outbox_catchup_relay_checkpoint_race:
    description: "Outbox tearDown MUST clear messages table to prevent CatchUpRelay replaying old events"
    authority: "rules/testing-patterns.md"
    authority_line_hint: 162
    canonical_pattern: "DELETE FROM messages"
    anti_pattern: "tearDown.*without.*messages.*cleanup"
    severity: high
    group: testing-traps
    dedup_strategy: marker
    consumers:
      - file: "templates/base-test-classes.md"

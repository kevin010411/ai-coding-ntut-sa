# DEPRECATED — This assertion file is superseded by AUTHORITY-REGISTRY.yaml
# topic: test_input_construction (Phase 1 anti-pattern + Phase 3 canonical)
# Kept for backward compatibility. Do not add new assertions here.
#
# Assertion: Test Input construction must use create() + field assignment
#
# Authority: patterns/usecase/command.md (Input is class → no all-args constructor)
# Contradiction ID: FC-E

id: test-input-construction
description: >
  Since Input is a class (not record), tests must construct Input using
  the create() factory method followed by field assignment, not via
  positional constructor arguments.

assertions:
  - name: "No concrete test example uses positional constructor"
    type: absence
    pattern: 'new Create\w+UseCase\.\w+Input\('
    exclude_context: '❌|WRONG'
    files:
      - patterns/testing/usecase-test.md

  - name: "Test examples use create() factory"
    type: presence
    pattern: '\.create\(\)'
    files:
      - patterns/testing/usecase-test.md

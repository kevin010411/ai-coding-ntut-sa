# Deterministic Review Rules for Gate 2.5
# 100% pattern matching, 0% LLM judgment
#
# Usage: validated by scripts/validate-generated-code.sh
# Authority: critical-rules.md (27 FORBIDDEN + 20 REQUIRED)

meta:
  version: "1.2"
  description: "Data-driven rules for deterministic code review gate (30F + 15R + 5S + 1X + 4TS = 55 rules)"
  blocking_severity:
    - critical
  non_blocking_severity:
    - warn

# ═══════════════════════════════════════════════════════════════
# FORBIDDEN rules: patterns that MUST NOT appear in generated code
# ═══════════════════════════════════════════════════════════════

forbidden:
  # --- DI / Annotation Anti-Patterns ---

  - id: F-01
    description: "@Service/@Component on Service classes (must use @Bean)"
    pattern: '^\s*@(Service|Component)\s*$'
    target: "*Service.java"
    severity: critical
    authority_ref: "critical-rules.md #2"

  - id: F-02
    description: "@ActiveProfiles in test classes (TestSuite controls profile)"
    pattern: '@ActiveProfiles'
    target: "*Test.java"
    severity: critical
    authority_ref: "critical-rules.md #3, ADR-021"

  - id: F-03
    description: "@EnableJpaRepositories on OutboxRepositoryConfig"
    pattern: '@EnableJpaRepositories'
    target: "*OutboxRepositoryConfig.java"
    severity: critical
    authority_ref: "critical-rules.md #9"

  - id: F-04
    description: "@EntityScan on OutboxRepositoryConfig"
    pattern: '@EntityScan'
    target: "*OutboxRepositoryConfig.java"
    severity: critical
    authority_ref: "critical-rules.md #10"

  # --- Wrong Import Paths ---

  - id: F-05
    description: "javax.persistence (must use jakarta)"
    pattern: 'import\s+javax\.persistence'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #7"

  - id: F-06
    description: "Wrong EzesVolatileRelay import path"
    pattern: 'import\s+tw\.teddysoft\.ezddd\.message\.relay'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #16"

  - id: F-07
    description: "Wrong EzScenario import path"
    pattern: 'import\s+tw\.teddysoft\.ezspec\.(testannotation|EzScenario)'
    target: "*Test.java"
    severity: critical
    authority_ref: "critical-rules.md #18"

  - id: F-08
    description: "Wrong Projection import path"
    pattern: 'import\s+tw\.teddysoft\.ezddd\.usecase\.port\.out\.repository\.projection'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #29"

  - id: F-09
    description: "ContractViolationException does not exist"
    pattern: 'ContractViolationException'
    target: "*.java"
    severity: critical
    exclude_context: '// WRONG|WRONG!|does not exist|❌'
    authority_ref: "critical-rules.md #15"

  # --- Event Sourcing Anti-Patterns ---

  - id: F-10
    description: "Instant.now() instead of DateProvider.now()"
    pattern: 'Instant\.now\(\)'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #4"

  - id: F-11
    description: "Map.of() for event metadata (must be mutable HashMap)"
    pattern: 'Map\.of\(\)'
    target: "*Events.java"
    severity: critical
    authority_ref: "critical-rules.md #5"

  - id: F-12
    description: "record for UseCase Input class (must be mutable class)"
    pattern: '^\s*public\s+record\s+\w*Input'
    target: "*UseCase.java"
    severity: critical
    authority_ref: "critical-rules.md #22"

  # --- Wrong API Usage ---

  - id: F-13
    description: "compositeMapper.putAll() does not exist"
    pattern: '\.putAll\(.*[Mm]apper'
    target: "*Events.java"
    severity: critical
    authority_ref: "critical-rules.md #12"

  - id: F-14
    description: "new InMemoryMessageProducer<>(broker) - no public constructor"
    pattern: 'new\s+InMemoryMessageProducer\s*<'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #11"

  - id: F-15
    description: "DomainEventMapper.toDomain 2-arg call (only 1 arg)"
    pattern: 'DomainEventMapper\.toDomain\([^)]+,\s*[^)]+\)'
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #30"

  - id: F-16
    description: "CqrsOutput.setDto() does not exist"
    pattern: 'CqrsOutput.*\.setDto\('
    target: "*.java"
    severity: critical
    authority_ref: "critical-rules.md #27"

  - id: F-17
    description: "Reactor method named react() instead of execute()"
    pattern: 'public\s+void\s+react\s*\(\s*DomainEventData'
    target: "*Reactor.java"
    severity: critical
    authority_ref: "critical-rules.md #31"

  - id: F-18
    description: "new InMemoryOrmDb<>() no-arg constructor"
    pattern: 'new\s+InMemoryOrmDb\s*<[^>]*>\s*\(\s*\)'
    target: "*Config.java"
    severity: critical
    authority_ref: "critical-rules.md #28"

  - id: F-19
    description: "@EzScenario with rule parameter (causes IllegalArgumentException)"
    pattern: '@EzScenario\s*\(\s*rule\s*='
    target: "*Test.java"
    severity: critical
    authority_ref: "critical-rules.md #26"

  - id: F-20
    description: "CrudRepository/JpaRepository in OrmClient (must extend SpringJpaClient)"
    pattern: 'extends\s+(CrudRepository|JpaRepository)'
    target: "*OrmClient.java"
    severity: critical
    authority_ref: "critical-rules.md #17"

  - id: F-21
    description: "@Enumerated on String field in PO"
    pattern: '@Enumerated'
    target: "*Data.java"
    severity: warn
    authority_ref: "critical-rules.md #19"

  - id: F-22
    description: "Thread.sleep() in ezSpec lambdas"
    pattern: 'Thread\.sleep\('
    target: "*Test.java"
    severity: warn
    authority_ref: "critical-rules.md #25"

  # --- ezSpec Anti-Patterns ---

  - id: F-23
    description: "() -> {} in ezSpec lambdas (must be env -> {})"
    pattern: '\.(Given|When|Then|And)\(\s*\(\)\s*->'
    target: "*Test.java"
    severity: critical
    authority_ref: "critical-rules.md #13, FC-6"

  - id: F-24
    description: "version/isDeleted field shadowing in Aggregate subclass"
    pattern: '(private|protected)\s+(long|int|boolean)\s+(version|isDeleted)\b'
    target: "entity/*.java"
    precondition_pattern: 'extends\s+EsAggregateRoot'
    severity: critical
    authority_ref: "critical-rules.md #21"

  # --- Hallucinated API ---

  - id: F-25
    description: "raiseEvent() does not exist (use apply())"
    pattern: 'raiseEvent\('
    target: "entity/*.java"
    severity: critical
    authority_ref: "COMMON MISTAKES table"

  - id: F-26
    description: "requireNotNull return assignment (returns void)"
    pattern: '=\s*requireNotNull\('
    target: "*.java"
    severity: critical
    authority_ref: "FORBIDDEN API table"

  - id: F-27
    description: "Integer value in env.put() (must be String for geti())"
    pattern: 'env\.put\([^,]+,\s*\d+\s*\)'
    target: "*Test.java"
    severity: critical
    authority_ref: "critical-rules.md FC-3"

  # --- Security: Secret Leakage Prevention ---

  - id: F-28
    description: "Hardcoded password in properties file"
    pattern: 'password\s*=\s*[^${\s][^\s]*'
    target: "*.properties"
    severity: warn
    authority_ref: "security-patterns.md #3"

  - id: F-29
    description: "Hardcoded secret in Java source"
    pattern: '(password|secret|apiKey|api_key)\s*=\s*"[^"$]+'
    target: "*.java"
    severity: warn
    exclude_context: '// WRONG|❌|System\.setProperty|ProfileSetter'
    authority_ref: "security-patterns.md #1"

  # --- Security: CORS Anti-Pattern ---

  - id: F-30
    description: "@CrossOrigin on controllers (must use centralized CorsConfig)"
    pattern: '@CrossOrigin'
    target: "*Controller.java"
    severity: critical
    authority_ref: "security-patterns.md #6"

# ═══════════════════════════════════════════════════════════════
# REQUIRED rules: patterns that MUST appear in matching files
# ═══════════════════════════════════════════════════════════════

required:
  - id: R-01
    description: "@DirtiesContext(classMode = AFTER_EACH_TEST_METHOD) in test classes"
    pattern: '@DirtiesContext'
    target: "*Test.java"
    precondition_pattern: 'extends\s+BaseSpringBootTest\b'
    negative_precondition: 'extends\s+BaseUseCaseTest'
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #1, ADR-021"

  - id: R-02
    description: "MAPPING_TYPE_PREFIX in Events class mapper()"
    pattern: 'MAPPING_TYPE_PREFIX'
    target: "*Events.java"
    precondition_pattern: 'sealed\s+interface|static.*mapper'
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #3"

  - id: R-03
    description: "sealed interface in Events class"
    pattern: 'sealed\s+interface'
    target: "*Events.java"
    severity: critical
    authority_ref: "domain-event.md"

  - id: R-04
    description: "setDomainEventDatas() in toData() method"
    pattern: 'setDomainEventDatas'
    target: "*Mapper.java"
    precondition_pattern: 'toData\s*\('
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #4"

  - id: R-05
    description: "setStreamName() in toData() method"
    pattern: 'setStreamName'
    target: "*Mapper.java"
    precondition_pattern: 'toData\s*\('
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #4"

  - id: R-06
    description: "setVersion() in toDomain() method"
    pattern: 'setVersion'
    target: "*Mapper.java"
    precondition_pattern: 'toDomain'
    severity: critical
    authority_ref: "critical-rules.md FORBIDDEN #24"

  - id: R-07
    description: "clearDomainEvents() in toDomain() method"
    pattern: 'clearDomainEvents'
    target: "*Mapper.java"
    precondition_pattern: 'toDomain'
    severity: critical
    authority_ref: "critical-rules.md FORBIDDEN #24"

  - id: R-08
    description: "public visibility on @EzScenario test methods"
    pattern: 'public\s+void\s+\w+.*\{'
    target: "*Test.java"
    precondition_pattern: '@EzScenario'
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #11"

  - id: R-09
    description: "DateProvider.now() for event timestamps"
    pattern: 'DateProvider\.now\(\)'
    target: "*Service.java"
    precondition_pattern: 'apply\(|repository\.save'
    severity: warn
    authority_ref: "critical-rules.md REQUIRED #5"

  - id: R-10
    description: "Null check in Reactor execute()"
    pattern: 'message\s*==\s*null|null\s*==\s*message'
    target: "*Reactor.java"
    precondition_pattern: 'implements\s+Reactor'
    severity: warn
    authority_ref: "critical-rules.md REQUIRED #16"

  - id: R-11
    description: "Aggregate command methods should have _xxxEventGenerated() postcondition helper"
    pattern: '_\w+EventGenerated'
    target: "entity/*.java"
    precondition_pattern: 'extends\s+EsAggregateRoot'
    severity: warn
    authority_ref: "critical-rules.md REQUIRED #20"

  - id: R-12
    description: "UseCase Input must have static create() factory method"
    pattern: 'static\s+\w*Input\s+create\('
    target: "*UseCase.java"
    precondition_pattern: 'class\s+\w*Input'
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #18"

  - id: R-13
    description: "Input/Output as UseCase inner class"
    pattern: 'class\s+\w*(Input|Output)\b'
    target: "*UseCase.java"
    precondition_pattern: 'interface\s+\w+UseCase'
    severity: warn
    authority_ref: "critical-rules.md REQUIRED #2"

  - id: R-14
    description: "setUpEventCapture() in test extending BaseUseCaseTest"
    pattern: 'setUpEventCapture'
    target: "*Test.java"
    precondition_pattern: 'extends\s+BaseUseCaseTest'
    severity: critical
    authority_ref: "critical-rules.md REQUIRED #1 (CLAUDE.md Rule 4)"

  - id: R-15
    description: "@Valid annotation on @RequestBody parameters"
    pattern: '@Valid\s+@RequestBody|@RequestBody\s+@Valid'
    target: "*Controller.java"
    precondition_pattern: '@RequestBody'
    severity: critical
    authority_ref: "security-patterns.md #4, controller.md Rule 7"

# ═══════════════════════════════════════════════════════════════
# STRUCTURE rules: package structure validation
# ═══════════════════════════════════════════════════════════════

structure:
  - id: S-01
    description: "Aggregate entity must be in entity/ package"
    file_pattern: "**/entity/*.java"
    package_must_contain: ".entity"
    exclude_pattern: "*Id.java|*Events.java|*Data.java"
    severity: critical

  - id: S-02
    description: "Service must be in usecase/service/ package"
    file_pattern: "*Service.java"
    package_must_contain: ".usecase.service"
    exclude_pattern: "*Config.java|*Test.java|*Fake*.java|*Notify*.java|*ReactorConfig.java"
    negative_package: ".usecase.reactor"
    severity: critical

  - id: S-03
    description: "Controller must be in adapter/in/rest/springboot/ package"
    file_pattern: "*Controller.java"
    package_must_contain: ".adapter.in.rest.springboot"
    exclude_pattern: "*Test.java"
    severity: critical

  - id: S-04
    description: "OrmClient must be in io/springboot/config/orm/ package"
    file_pattern: "*OrmClient.java"
    package_must_contain: ".io.springboot.config.orm"
    severity: critical

  - id: S-05
    description: "Config must be in io/springboot/config/ package"
    file_pattern: "*Config.java"
    package_must_contain: ".io.springboot.config"
    exclude_pattern: "*Test*.java"
    severity: warn

# ═══════════════════════════════════════════════════════════════
# CROSS-FILE rules: consistency between related files
# ═══════════════════════════════════════════════════════════════

cross_file:
  - id: X-01
    description: "InMemory and Outbox configs must use same bean name"
    file_a: "*InMemoryRepositoryConfig.java"
    file_b: "*OutboxRepositoryConfig.java"
    extract_pattern: '@Bean\("(\w+)"\)'
    must_match: true
    severity: critical
    authority_ref: "ADR-044"

# ═══════════════════════════════════════════════════════════════
# TESTSUITE rules: aggregate package coverage in TestSuite
# ═══════════════════════════════════════════════════════════════

testsuite:
  - id: TS-01
    description: "Aggregate package must be in InMemoryTestSuite @SelectPackages"
    suite_file: "InMemoryTestSuite.java"
    annotation: "@SelectPackages"
    severity: critical
    authority_ref: "ADR-021, ADR-049"

  - id: TS-02
    description: "Aggregate package must be in OutboxTestSuite @SelectPackages"
    suite_file: "OutboxTestSuite.java"
    annotation: "@SelectPackages"
    severity: critical
    authority_ref: "ADR-021, ADR-049"

  - id: TS-03
    description: "TestSuite must use ProfileSetter inner class (not @ActiveProfiles)"
    suite_file: "*TestSuite.java"
    required_pattern: "ProfileSetter"
    severity: critical
    authority_ref: "ADR-021"

  - id: TS-04
    description: "Every package in @SelectPackages must have a corresponding source directory (no stale references)"
    suite_file: "*TestSuite.java"
    check_type: "reverse_coverage"
    severity: critical
    authority_ref: "ADR-021, ADR-049"
